                  ('"aala_logo.png"',                                             '"../../assets/aala_logo.png"'),
                  ('"patrullajes_dashboard.html"',                                '"dashboard.html"'),
                  ('"patrullajes_datos.html"',                                    '"datos.html"'),
                  ('"patrullajes_analitica.html"',                                '"analitica.html"'),
                  ('"./datos_patrullaje.csv"',                                    '"../../datos/datos_patrullaje.csv"'),
                  ('"datos_patrullaje.csv"',                                      '"../../datos/datos_patrullaje.csv"'),
                  ('"./data/datos_patrullaje.csv"',                               '"../../datos/datos_patrullaje.csv"'),
                  ('"data/datos_patrullaje.csv"',                                 '"../../datos/datos_patrullaje.csv"'),
                  (f'"{RAW}/main/datos_patrullaje.csv"',                          f'"{RAW}/main/docs/datos/datos_patrullaje.csv"'),
                  (f'"{RAW}/master/datos_patrullaje.csv"',                        f'"{RAW}/main/docs/datos/datos_patrullaje.csv"'),
              ],
              # ── patrullajes/datos.html ──
              "docs/boletas/patrullajes/datos.html": [
                  ('"conap_logo.jpg"',             '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',              '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',          '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',           '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',           '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',           '"../../assets/xlsx.full.min.js"'),
                  ('"patrullajes_dashboard.html"', '"dashboard.html"'),
                  ('"patrullajes_tablero.html"',   '"tablero.html"'),
                  ('"./datos_patrullaje.csv"',     '"../../datos/datos_patrullaje.csv"'),
              ],
              # ── patrullajes/analitica.html ──
              "docs/boletas/patrullajes/analitica.html": [
                  ('"conap_logo.jpg"',             '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',              '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',          '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',           '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',           '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',           '"../../assets/xlsx.full.min.js"'),
                  ('"patrullajes_dashboard.html"', '"dashboard.html"'),
                  ('"patrullajes_tablero.html"',   '"tablero.html"'),
                  ('"./datos_patrullaje.csv"',     '"../../datos/datos_patrullaje.csv"'),
              ],
              # ── viveros/dashboard.html ──
              "docs/boletas/viveros/dashboard.html": [
