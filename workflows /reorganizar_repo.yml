# workflows/reorganizar_repo.yml
#
# Workflow de USO ÚNICO — reorganiza el repo a la estructura docs/
#
# Cómo usarlo:
#   1. Sube este archivo al repo en .github/workflows/reorganizar_repo.yml
#   2. Ve a GitHub → Actions → "Reorganizar repositorio" → Run workflow
#   3. Verifica que todo quedó bien
#   4. Puedes borrar este archivo después (ya no se necesita)

name: Reorganizar repositorio

on:
  workflow_dispatch:   # solo manual, nunca automático

jobs:
  reorganizar:
    name: Mover archivos y actualizar rutas
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Reorganizar estructura y actualizar rutas
        run: |
          python3 << 'PYEOF'
          import os, shutil, re

          # ── Crear carpetas nuevas ──────────────────────────────────────
          carpetas = [
              "docs/datos",
              "docs/assets",
              "docs/boletas/patrullajes",
              "docs/boletas/viveros",
              "docs/boletas/consumo_forestal",
              "docs/boletas/reforestaciones",
          ]
          for c in carpetas:
              os.makedirs(c, exist_ok=True)
              print(f"  ✓ Carpeta: {c}")

          # ── Mapa de archivos: origen → destino ────────────────────────
          mover = {
              # Portal principal
              "index.html":                "docs/index.html",
              # CSVs
              "datos_patrullaje.csv":      "docs/datos/datos_patrullaje.csv",
              "base2_datos.csv":           "docs/datos/base2_datos.csv",
              "base3_datos.csv":           "docs/datos/base3_datos.csv",
              "base4_datos.csv":           "docs/datos/base4_datos.csv",
              # Boleta patrullajes
              "patrullajes_dashboard.html":"docs/boletas/patrullajes/dashboard.html",
              "patrullajes_tablero.html":  "docs/boletas/patrullajes/tablero.html",
              "patrullajes_datos.html":    "docs/boletas/patrullajes/datos.html",
              "patrullajes_analitica.html":"docs/boletas/patrullajes/analitica.html",
              # Boleta viveros (ac210)
              "ac210_dashboard.html":      "docs/boletas/viveros/dashboard.html",
              "ac210_tablero.html":        "docs/boletas/viveros/tablero.html",
              "ac210_datos.html":          "docs/boletas/viveros/datos.html",
              # Boleta consumo forestal (base3)
              "base3_dashboard.html":      "docs/boletas/consumo_forestal/dashboard.html",
              "base3_tablero.html":        "docs/boletas/consumo_forestal/tablero.html",
              "base3_datos.html":          "docs/boletas/consumo_forestal/datos.html",
              # Boleta reforestaciones (base4)
              "base4_dashboard.html":      "docs/boletas/reforestaciones/dashboard.html",
              "base4_tablero.html":        "docs/boletas/reforestaciones/tablero.html",
              "base4_datos.html":          "docs/boletas/reforestaciones/datos.html",
              # Assets
              "aala_logo.png":             "docs/assets/aala_logo.png",
              "rafv_aala_logo.png":        "docs/assets/rafv_aala_logo.png",
              "conap_logo.jpg":            "docs/assets/conap_logo.jpg",
              "papaparse.min.js":          "docs/assets/papaparse.min.js",
              "tabulator.min.js":          "docs/assets/tabulator.min.js",
              "tabulator.min.css":         "docs/assets/tabulator.min.css",
              "xlsx.full.min.js":          "docs/assets/xlsx.full.min.js",
          }

          for origen, destino in mover.items():
              if os.path.exists(origen):
                  shutil.copy2(origen, destino)
                  print(f"  ✓ {origen} → {destino}")
              else:
                  print(f"  ⚠ No encontrado: {origen}")

          # ── Sustituciones de rutas en cada HTML ───────────────────────
          # Cada entrada: (archivo_destino, [(buscar, reemplazar), ...])
          RAW = "https://raw.githubusercontent.com/geograficaaala/guardarecursos_conap"

          parches = {
              # ── index.html ──
              "docs/index.html": [
                  ('"conap_logo.jpg"',             '"assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',              '"assets/aala_logo.png"'),
                  ('"patrullajes_dashboard.html"', '"boletas/patrullajes/dashboard.html"'),
                  ('"ac210_dashboard.html"',       '"boletas/viveros/dashboard.html"'),
                  ('"base3_dashboard.html"',       '"boletas/consumo_forestal/dashboard.html"'),
                  ('"base4_dashboard.html"',       '"boletas/reforestaciones/dashboard.html"'),
              ],
              # ── patrullajes/dashboard.html ──
