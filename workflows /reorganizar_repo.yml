                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"base3_dashboard.html"',  '"dashboard.html"'),
                  ('"base3_datos.html"',      '"datos.html"'),
                  ('"./base3_datos.csv"',     '"../../datos/base3_datos.csv"'),
                  ('"base3_datos.csv"',       '"../../datos/base3_datos.csv"'),
              ],
              # ── consumo_forestal/datos.html ──
              "docs/boletas/consumo_forestal/datos.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"base3_dashboard.html"',  '"dashboard.html"'),
                  ('"./base3_datos.csv"',     '"../../datos/base3_datos.csv"'),
                  ('"base3_datos.csv"',       '"../../datos/base3_datos.csv"'),
              ],
              # ── reforestaciones/dashboard.html ──
              "docs/boletas/reforestaciones/dashboard.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"base4_tablero.html"',    '"tablero.html"'),
                  ('"base4_datos.html"',      '"datos.html"'),
              ],
              # ── reforestaciones/tablero.html ──
              "docs/boletas/reforestaciones/tablero.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"base4_dashboard.html"',  '"dashboard.html"'),
                  ('"base4_datos.html"',      '"datos.html"'),
                  ('"./base4_datos.csv"',     '"../../datos/base4_datos.csv"'),
                  ('"base4_datos.csv"',       '"../../datos/base4_datos.csv"'),
              ],
              # ── reforestaciones/datos.html ──
              "docs/boletas/reforestaciones/datos.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"base4_dashboard.html"',  '"dashboard.html"'),
                  ('"./base4_datos.csv"',     '"../../datos/base4_datos.csv"'),
                  ('"base4_datos.csv"',       '"../../datos/base4_datos.csv"'),
              ],
          }

          for archivo, subs in parches.items():
              if not os.path.exists(archivo):
                  print(f"  ⚠ Archivo no encontrado para parchear: {archivo}")
                  continue
              with open(archivo, "r", encoding="utf-8", errors="replace") as f:
                  contenido = f.read()
              cambios = 0
              for buscar, reemplazar in subs:
                  if buscar in contenido:
                      contenido = contenido.replace(buscar, reemplazar)
                      cambios += 1
              with open(archivo, "w", encoding="utf-8") as f:
                  f.write(contenido)
              print(f"  ✓ Rutas actualizadas ({cambios} cambios): {archivo}")

          print("\n✓ Reorganización completa.")
          PYEOF

      - name: Eliminar archivos sueltos de la raíz
        run: |
          # Eliminar archivos que ya fueron copiados a docs/
          archivos=(
            index.html
            datos_patrullaje.csv base2_datos.csv base3_datos.csv base4_datos.csv
            patrullajes_dashboard.html patrullajes_tablero.html patrullajes_datos.html patrullajes_analitica.html
            ac210_dashboard.html ac210_tablero.html ac210_datos.html
            base3_dashboard.html base3_tablero.html base3_datos.html
            base4_dashboard.html base4_tablero.html base4_datos.html
            aala_logo.png rafv_aala_logo.png conap_logo.jpg
            papaparse.min.js tabulator.min.js tabulator.min.css xlsx.full.min.js
          )
          for f in "${archivos[@]}"; do
            if [ -f "$f" ]; then
              git rm "$f"
              echo "  ✓ Eliminado de raíz: $f"
            fi
          done

      - name: Confirmar y publicar cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git commit -m "🗂️ Reorganización del repositorio → estructura docs/"
          git push
