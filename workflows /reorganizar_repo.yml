                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"ac210_tablero.html"',    '"tablero.html"'),
                  ('"ac210_datos.html"',      '"datos.html"'),
              ],
              # ── viveros/tablero.html ──
              "docs/boletas/viveros/tablero.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"ac210_dashboard.html"',  '"dashboard.html"'),
                  ('"ac210_datos.html"',      '"datos.html"'),
                  ('"./base2_datos.csv"',     '"../../datos/base2_datos.csv"'),
                  ('"base2_datos.csv"',       '"../../datos/base2_datos.csv"'),
              ],
              # ── viveros/datos.html ──
              "docs/boletas/viveros/datos.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"tabulator.min.css"',     '"../../assets/tabulator.min.css"'),
                  ('"tabulator.min.js"',      '"../../assets/tabulator.min.js"'),
                  ('"papaparse.min.js"',      '"../../assets/papaparse.min.js"'),
                  ('"xlsx.full.min.js"',      '"../../assets/xlsx.full.min.js"'),
                  ('"ac210_dashboard.html"',  '"dashboard.html"'),
                  ('"./base2_datos.csv"',     '"../../datos/base2_datos.csv"'),
                  ('"base2_datos.csv"',       '"../../datos/base2_datos.csv"'),
              ],
              # ── consumo_forestal/dashboard.html ──
              "docs/boletas/consumo_forestal/dashboard.html": [
                  ('"conap_logo.jpg"',        '"../../assets/conap_logo.jpg"'),
                  ('"aala_logo.png"',         '"../../assets/aala_logo.png"'),
                  ('"base3_tablero.html"',    '"tablero.html"'),
