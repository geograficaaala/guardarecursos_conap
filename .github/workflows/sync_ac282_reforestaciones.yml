# .github/workflows/sync_ac282_reforestaciones.yml
#
# AC282 · Monitoreo a reforestaciones por compromiso
# Sincroniza ArcGIS Online / Survey123 → docs/datos/base4_datos.csv
#
# Este workflow rehace el CSV de forma segura:
#   1. Convierte fechas ANTES de limpiar texto.
#   2. Soporta fechas ArcGIS como milisegundos, segundos, texto ISO, texto m/d/Y y serial Excel.
#   3. Elimina filas sin Fecha porque no sirven para verificadores por período.
#   4. Conserva únicamente histórico válido del CSV existente, si hubiera registros antiguos que no vienen de ArcGIS.
#   5. Deduplica prefiriendo la descarga nueva de ArcGIS.

name: Sincronizar AC282 Reforestaciones

on:
  schedule:
    - cron: "45 18 * * *"   # 12:45 mediodía Guatemala
    - cron: "45 6 * * *"    # 00:45 medianoche Guatemala
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-ac282-reforestaciones
  cancel-in-progress: false

jobs:
  sync:
    name: Reconstruir CSV limpio de AC282
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Descargar, limpiar y reconstruir base4_datos.csv
        env:
          AGOL_USERNAME: ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD: ${{ secrets.AGOL_PASSWORD }}
          AGOL_ORG_URL:  ${{ secrets.AGOL_ORG_URL }}
          # Opcional: si cambia el item de Survey123/Feature Service, crear este secret.
          AC282_ITEM_ID: ${{ secrets.AC282_ITEM_ID }}
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import sys
          import unicodedata
          import requests
          import pandas as pd

          ORG_URL  = os.environ["AGOL_ORG_URL"].rstrip("/")
          USERNAME = os.environ["AGOL_USERNAME"]
          PASSWORD = os.environ["AGOL_PASSWORD"]

          # ID tomado del Excel exportado de Survey123:
          # S123_86dc581bf1874d73aa8c5a14428a5d4a_EXCEL.xlsx
          ITEM_ID    = os.environ.get("AC282_ITEM_ID", "").strip() or "86dc581bf1874d73aa8c5a14428a5d4a"
          OUTPUT_CSV = "docs/datos/base4_datos.csv"
          PAGE_SIZE  = 1000

          COLS = [
              "Nombre del guardarrecursos",
              "Region",
              "Area protegida",
              "Especifique el area protegida",
              "Municipio",
              "Esta monitoreando un area fuera de su municipio",
              "Especifique el municipio o lugar de apoyo",
              "Nombre del area o lugar de la reforestacion establecida",
              "Tipo de reforestacion",
              "Area de reforestacion",
              "Especies reforestadas",
              "Especifique otra especie",
              "Fecha",
              "Hora",
              "Observaciones",
              "CreationDate",
              "EditDate",
              "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",
              "X",
              "Y",
          ]

          RENAME = {
              # IDs del sistema
              "OBJECTID": "ObjectID",
              "ObjectID": "ObjectID",
              "objectid": "ObjectID",
              "GLOBALID": "GlobalID",
              "GlobalID": "GlobalID",
              "globalid": "GlobalID",

              # Identidad / ubicación administrativa
              "nombre_guardarecurso": "Nombre del guardarrecursos",
              "nombre_guardarrecursos": "Nombre del guardarrecursos",
              "Nombre del guardarrecursos": "Nombre del guardarrecursos",
              "Nombre del guardarecurso": "Nombre del guardarrecursos",
              "guardarecurso": "Nombre del guardarrecursos",
              "guarda_recurso": "Nombre del guardarrecursos",
              "region": "Region",
              "Region": "Region",
              "area_protegida": "Area protegida",
              "Área protegida": "Area protegida",
              "Area protegida": "Area protegida",
              "area_protegida_otro": "Especifique el area protegida",
              "especifique_area_protegida": "Especifique el area protegida",
              "Especifique el área protegida": "Especifique el area protegida",
              "Especifique el area protegida": "Especifique el area protegida",
              "municipio": "Municipio",
              "Municipio": "Municipio",

              # Monitoreo fuera del municipio
              "apoyo_fuera": "Esta monitoreando un area fuera de su municipio",
              "monitoreo_fuera": "Esta monitoreando un area fuera de su municipio",
              "monitoreo_fuera_municipio": "Esta monitoreando un area fuera de su municipio",
              "monitorea_fuera_municipio": "Esta monitoreando un area fuera de su municipio",
              "Esta monitoreando un area fuera de su municipio": "Esta monitoreando un area fuera de su municipio",
              "¿Está monitoreando un área fuera de su municipio?": "Esta monitoreando un area fuera de su municipio",
              "apoyo_fuera_detalle": "Especifique el municipio o lugar de apoyo",
              "municipio_lugar_apoyo": "Especifique el municipio o lugar de apoyo",
              "Especifique el municipio o lugar de apoyo": "Especifique el municipio o lugar de apoyo",

              # Datos de reforestación
              "nombre_area": "Nombre del area o lugar de la reforestacion establecida",
              "nombre_area_reforestacion": "Nombre del area o lugar de la reforestacion establecida",
              "lugar_reforestacion": "Nombre del area o lugar de la reforestacion establecida",
              "Nombre del área y/o lugar de la reforestación establecida (Cantón, Barrio, Caserío, Aldea, Parcelamiento, etc.)": "Nombre del area o lugar de la reforestacion establecida",
              "Nombre del área o lugar de la reforestación establecida": "Nombre del area o lugar de la reforestacion establecida",
              "Nombre del area o lugar de la reforestacion establecida": "Nombre del area o lugar de la reforestacion establecida",
              "tipo_reforestacion": "Tipo de reforestacion",
              "Tipo de reforestación": "Tipo de reforestacion",
              "Tipo de reforestacion": "Tipo de reforestacion",
              "area_reforestacion": "Area de reforestacion",
              "Área de reforestación (m²)": "Area de reforestacion",
              "Area de reforestacion": "Area de reforestacion",
              "especies_reforestadas": "Especies reforestadas",
              "Especies reforestadas": "Especies reforestadas",
              "especie_otro": "Especifique otra especie",
              "Especifique otra especie": "Especifique otra especie",

              # Fecha / hora / observaciones
              "fecha": "Fecha",
              "Fecha": "Fecha",
              "fecha_monitoreo": "Fecha",
              "fecha_reforestacion": "Fecha",
              "fecha_reforestación": "Fecha",
              "hora": "Hora",
              "Hora": "Hora",
              "observaciones": "Observaciones",
              "Observaciones": "Observaciones",
              "CreationDate": "CreationDate",
              "created_date": "CreationDate",
              "EditDate": "EditDate",
              "last_edited_date": "EditDate",

              # Consumo cedido por compañero
              "consumo_fuera_comp": "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",
              "atendiendo_consumo_fuera": "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",
              "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso": "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",
              "¿Está atendiendo un consumo fuera de su municipio de intervención cedido por otro guardarecurso?": "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",

              # Coordenadas
              "x": "X",
              "y": "Y",
              "X": "X",
              "Y": "Y",
          }

          FIX_AREA = {
              "rumcla": "RUMCLA",
              "fuera_rumcla": "Fuera de RUMCLA",
              "fuera de rumcla": "Fuera de RUMCLA",
          }

          FIX_SINO = {
              "si": "si",
              "sí": "si",
              "sÍ": "si",
              "no": "no",
              "nan": "",
              "none": "",
              "null": "",
              "nat": "",
          }

          def clean_text(value):
              if pd.isna(value):
                  return ""
              text = str(value).strip()
              if text.lower() in {"nan", "none", "null", "nat"}:
                  return ""
              return text

          def strip_accents(text):
              return "".join(
                  ch for ch in unicodedata.normalize("NFKD", str(text))
                  if not unicodedata.combining(ch)
              )

          def norm_key(text):
              text = strip_accents(text).lower().strip()
              text = re.sub(r"[^a-z0-9]+", "_", text)
              return re.sub(r"_+", "_", text).strip("_")

          def key_text(value):
              text = strip_accents(clean_text(value)).lower()
              text = re.sub(r"\s+", " ", text).strip()
              return text

          def parse_datetime_series(series, prefer_dayfirst=False):
              """Parsea fechas de ArcGIS/Survey123 y CSV histórico de forma tolerante."""
              if series is None:
                  return pd.Series(dtype="datetime64[ns]")

              s = pd.Series(series).copy()
              result = pd.Series(pd.NaT, index=s.index, dtype="datetime64[ns]")

              # 1) Números o texto numérico: ArcGIS suele entregar milisegundos Unix.
              numeric = pd.to_numeric(s, errors="coerce")

              mask_ms = numeric.between(10**11, 2 * 10**13, inclusive="both")
              if mask_ms.any():
                  result.loc[mask_ms] = pd.to_datetime(numeric.loc[mask_ms], unit="ms", errors="coerce")

              mask_s = result.isna() & numeric.between(10**8, 2 * 10**10, inclusive="both")
              if mask_s.any():
                  result.loc[mask_s] = pd.to_datetime(numeric.loc[mask_s], unit="s", errors="coerce")

              # 2) Serial Excel, por si algún histórico quedó así.
              mask_excel = result.isna() & numeric.between(20000, 80000, inclusive="both")
              if mask_excel.any():
                  result.loc[mask_excel] = pd.to_datetime(
                      numeric.loc[mask_excel], unit="D", origin="1899-12-30", errors="coerce"
                  )

              # 3) Texto: ISO, m/d/Y, d/m/Y.
              text = s.apply(clean_text)
              mask_text = result.isna() & (text != "")
              if mask_text.any():
                  parsed = pd.to_datetime(text.loc[mask_text], errors="coerce", dayfirst=prefer_dayfirst)
                  result.loc[mask_text] = parsed

              # 4) Segundo intento con la convención opuesta si algo quedó sin parsear.
              mask_text_2 = result.isna() & (text != "")
              if mask_text_2.any():
                  parsed2 = pd.to_datetime(text.loc[mask_text_2], errors="coerce", dayfirst=not prefer_dayfirst)
                  result.loc[mask_text_2] = parsed2

              return result

          def format_form_date(series):
              # Formato histórico del CSV: M/D/YYYY HH:MM, ejemplo 3/4/2026 18:00.
              dt = parse_datetime_series(series, prefer_dayfirst=False)
              out = []
              for val in dt:
                  if pd.isna(val):
                      out.append("")
                  else:
                      out.append(f"{val.month}/{val.day}/{val.year} {val.hour:02d}:{val.minute:02d}")
              return pd.Series(out, index=pd.Series(series).index)

          def format_system_datetime(series):
              dt = parse_datetime_series(series, prefer_dayfirst=False)
              out = []
              for val in dt:
                  if pd.isna(val):
                      out.append("")
                  else:
                      out.append(val.strftime("%m/%d/%Y %H:%M:%S.%f"))
              return pd.Series(out, index=pd.Series(series).index)

          def format_time_only(series):
              s = pd.Series(series).copy()

              # Si viene como milisegundos Unix o datetime completo, extraer HH:MM.
              dt = parse_datetime_series(s, prefer_dayfirst=False)
              out = s.apply(clean_text)
              mask_dt = dt.notna()
              if mask_dt.any():
                  out.loc[mask_dt] = dt.loc[mask_dt].dt.strftime("%H:%M")

              # Si ya viene como 9:05, 09:05:00, etc.
              out = out.str.replace(r"^(\d{1,2}:\d{2}):\d{2}$", r"\1", regex=True)
              out = out.str.replace(r"^(\d{1,2}):(\d{2})$", lambda m: f"{int(m.group(1)):02d}:{m.group(2)}", regex=True)
              out = out.replace({"nan": "", "None": "", "NaT": ""})
              return out

          def auth_token():
              r = requests.post(
                  f"{ORG_URL}/sharing/rest/generateToken",
                  data={
                      "username": USERNAME,
                      "password": PASSWORD,
                      "referer": "https://www.arcgis.com",
                      "expiration": 120,
                      "f": "json",
                  },
                  timeout=30,
              )
              r.raise_for_status()
              data = r.json()
              if "error" in data:
                  print(f"ERROR de autenticación: {data['error']}")
                  sys.exit(1)
              return data["token"]

          def resolve_service_url(token):
              r = requests.get(
                  f"{ORG_URL}/sharing/rest/content/items/{ITEM_ID}",
                  params={"f": "json", "token": token},
                  timeout=30,
              )
              r.raise_for_status()
              item_data = r.json()
              if "error" in item_data:
                  print(f"ERROR leyendo item: {item_data['error']}")
                  sys.exit(1)

              print(f"  Item: {item_data.get('title')} | tipo: {item_data.get('type')}")
              service_url = item_data.get("url")

              if not service_url:
                  print("  URL directa no encontrada. Buscando relación Survey2Service...")
                  r2 = requests.get(
                      f"{ORG_URL}/sharing/rest/content/items/{ITEM_ID}/relatedItems",
                      params={
                          "relationshipType": "Survey2Service",
                          "direction": "forward",
                          "f": "json",
                          "token": token,
                      },
                      timeout=30,
                  )
                  r2.raise_for_status()
                  related = r2.json().get("relatedItems", [])
                  print(f"  Items relacionados: {len(related)}")
                  for rel in related:
                      if rel.get("url"):
                          service_url = rel["url"]
                          print(f"  Encontrado: {service_url}")
                          break

              if not service_url:
                  print("  Buscando Feature Service por nombre...")
                  r3 = requests.get(
                      f"{ORG_URL}/sharing/rest/search",
                      params={
                          "q": f"owner:{USERNAME} type:'Feature Service' tags:survey",
                          "num": 100,
                          "f": "json",
                          "token": token,
                      },
                      timeout=30,
                  )
                  r3.raise_for_status()
                  for res in r3.json().get("results", []):
                      title = (res.get("title") or "").lower()
                      if any(k in title for k in ["reforest", "reforestacion", "reforestación", "ac282", "282", "compromiso"]):
                          service_url = res.get("url", "")
                          print(f"  Encontrado por búsqueda: {res.get('title')} → {service_url}")
                          break

              if not service_url:
                  print("ERROR: No se pudo encontrar la URL del Feature Service.")
                  print("Si el ITEM_ID por defecto no corresponde, crear el secret AC282_ITEM_ID con el item correcto.")
                  sys.exit(1)

              return service_url.rstrip("/")

          def read_existing_csv(path):
              for enc in ("utf-8-sig", "utf-8", "latin-1", "cp1252"):
                  try:
                      df = pd.read_csv(path, sep=";", encoding=enc)
                      print(f"✓ Histórico existente: {len(df)} registros (encoding: {enc})")
                      return df
                  except UnicodeDecodeError:
                      continue
              print("⚠ No se pudo leer el CSV histórico. Se reconstruirá solo con ArcGIS.")
              return pd.DataFrame()

          def normalize_columns_from_aliases(df, fields):
              aliases = {f.get("name"): f.get("alias") for f in fields if f.get("name") and f.get("alias")}
              rename_by_norm = {norm_key(k): v for k, v in RENAME.items()}
              dynamic_rename = dict(RENAME)
              for name, alias in aliases.items():
                  alias_norm = norm_key(alias)
                  name_norm = norm_key(name)
                  if alias_norm in rename_by_norm:
                      dynamic_rename[name] = rename_by_norm[alias_norm]
                  elif name_norm in rename_by_norm:
                      dynamic_rename[name] = rename_by_norm[name_norm]
              return df.rename(columns=dynamic_rename)

          def find_layer_url(service_url, token):
              # Normalmente Survey123 usa la capa 0. Se confirma buscando una capa con geometryType o fields.
              r = requests.get(service_url, params={"f": "json", "token": token}, timeout=30)
              r.raise_for_status()
              sj = r.json()
              layers = sj.get("layers") or []
              if layers:
                  layer_id = layers[0].get("id", 0)
                  print(f"  Capa seleccionada: {layer_id} · {layers[0].get('name', '')}")
                  return f"{service_url}/{layer_id}"
              return f"{service_url}/0"

          def download_features(layer_url, token):
              r_fields = requests.get(layer_url, params={"f": "json", "token": token}, timeout=30)
              r_fields.raise_for_status()
              layer_info = r_fields.json()
              fields = layer_info.get("fields", [])
              print(f"  Campos en ArcGIS ({len(fields)}): {[f.get('name') for f in fields]}")

              r_count = requests.get(
                  f"{layer_url}/query",
                  params={"where": "1=1", "returnCountOnly": "true", "f": "json", "token": token},
                  timeout=30,
              )
              r_count.raise_for_status()
              total = r_count.json().get("count", 0)
              print(f"✓ Registros en ArcGIS: {total}")

              pages = []
              offset = 0
              while True:
                  r = requests.get(
                      f"{layer_url}/query",
                      params={
                          "where": "1=1",
                          "outFields": "*",
                          "resultOffset": offset,
                          "resultRecordCount": PAGE_SIZE,
                          "returnGeometry": "true",
                          "f": "json",
                          "token": token,
                      },
                      timeout=60,
                  )
                  r.raise_for_status()
                  rj = r.json()
                  if "error" in rj:
                      print(f"ERROR en query ArcGIS: {rj['error']}")
                      sys.exit(1)

                  features = rj.get("features", [])
                  if not features:
                      break

                  rows_page = []
                  for feat in features:
                      attrs = dict(feat.get("attributes", {}))
                      geo = feat.get("geometry") or {}
                      if "x" not in attrs and "X" not in attrs and geo.get("x") is not None:
                          attrs["x"] = geo["x"]
                      if "y" not in attrs and "Y" not in attrs and geo.get("y") is not None:
                          attrs["y"] = geo["y"]
                      rows_page.append(attrs)

                  pages.append(pd.DataFrame(rows_page))
                  offset += len(features)
                  print(f"  Descargados: {offset}/{total}", end="\r")
                  if not rj.get("exceededTransferLimit", False):
                      break
              print()

              df = pd.concat(pages, ignore_index=True) if pages else pd.DataFrame()
              return df, fields

          def prepare_new_dataframe(df_raw, fields):
              if df_raw.empty:
                  return pd.DataFrame(columns=COLS + ["_source_id", "_source_priority"])

              df = normalize_columns_from_aliases(df_raw, fields)

              # ID de origen para deduplicar. No se publica en el CSV final.
              id_candidates = [c for c in ["GlobalID", "GLOBALID", "globalid", "ObjectID", "OBJECTID", "objectid"] if c in df.columns]
              df["_source_id"] = df[id_candidates[0]].apply(clean_text) if id_candidates else ""
              df["_source_priority"] = 1

              # Crear columnas faltantes antes de transformar.
              for c in COLS:
                  if c not in df.columns:
                      df[c] = ""

              # IMPORTANTE: fechas y horas se convierten ANTES de limpiar texto.
              df["Fecha"] = format_form_date(df["Fecha"])
              df["CreationDate"] = format_system_datetime(df["CreationDate"])
              df["EditDate"] = format_system_datetime(df["EditDate"])
              df["Hora"] = format_time_only(df["Hora"])

              # Limpieza de texto después de convertir fechas.
              for c in COLS:
                  df[c] = df[c].apply(clean_text)

              df["Region"] = df["Region"].replace("", "Altiplano Central")
              df["Area protegida"] = df["Area protegida"].str.strip().str.lower().replace(FIX_AREA)

              for col in [
                  "Esta monitoreando un area fuera de su municipio",
                  "Esta atendiendo un consumo fuera de su municipio de intervencion cedido por otro guardarecurso",
              ]:
                  df[col] = df[col].str.strip().str.lower().replace(FIX_SINO)

              df["Especies reforestadas"] = (
                  df["Especies reforestadas"]
                  .str.strip()
                  .str.replace(" ", ",", regex=False)
                  .str.replace(r",+", ",", regex=True)
                  .str.strip(",")
                  .replace({"nan": "", "None": ""})
              )

              raw_count = len(df)
              df = df[df["Fecha"].str.strip() != ""].copy()
              dropped = raw_count - len(df)
              print(f"✓ ArcGIS con Fecha válida: {len(df)} registros")
              if dropped:
                  print(f"⚠ ArcGIS sin Fecha descartados: {dropped} registros")

              if raw_count > 0 and len(df) == 0:
                  print("ERROR: ArcGIS devolvió registros, pero ninguno tiene Fecha válida.")
                  print("No se actualiza el CSV para evitar borrar la base. Revisar nombre/formato del campo Fecha.")
                  sys.exit(1)

              return df[COLS + ["_source_id", "_source_priority"]]

          def prepare_legacy_dataframe(path):
              if not os.path.exists(path):
                  print("Sin histórico previo.")
                  return pd.DataFrame(columns=COLS + ["_source_id", "_source_priority"])

              df = read_existing_csv(path)
              if df.empty:
                  return pd.DataFrame(columns=COLS + ["_source_id", "_source_priority"])

              for c in COLS:
                  if c not in df.columns:
                      df[c] = ""
              if "_source_id" not in df.columns:
                  df["_source_id"] = ""
              df["_source_priority"] = 0

              # Reformat histórico para uniformar; también limpia filas inválidas.
              df["Fecha"] = format_form_date(df["Fecha"])
              df["CreationDate"] = format_system_datetime(df["CreationDate"])
              df["EditDate"] = format_system_datetime(df["EditDate"])
              df["Hora"] = format_time_only(df["Hora"])

              for c in COLS + ["_source_id"]:
                  df[c] = df[c].apply(clean_text)

              before = len(df)
              df = df[df["Fecha"].str.strip() != ""].copy()
              print(f"✓ Histórico con Fecha válida conservado: {len(df)} registros")
              if before - len(df):
                  print(f"✓ Histórico sin Fecha eliminado: {before - len(df)} registros")

              return df[COLS + ["_source_id", "_source_priority"]]

          def make_dedupe_key(df):
              date_key = parse_datetime_series(df["Fecha"], prefer_dayfirst=False).dt.strftime("%Y-%m-%d").fillna("")
              area_num = pd.to_numeric(df["Area de reforestacion"], errors="coerce").round(4).astype(str).replace("nan", "")
              return (
                  df["Nombre del guardarrecursos"].map(key_text) + "|" +
                  date_key + "|" +
                  df["Hora"].map(key_text) + "|" +
                  df["Municipio"].map(key_text) + "|" +
                  df["Nombre del area o lugar de la reforestacion establecida"].map(key_text) + "|" +
                  df["Tipo de reforestacion"].map(key_text) + "|" +
                  area_num + "|" +
                  df["Especies reforestadas"].map(key_text) + "|" +
                  df["X"].map(key_text) + "|" +
                  df["Y"].map(key_text)
              )

          def rebuild_csv(df_legacy, df_new):
              combined = pd.concat([df_legacy, df_new], ignore_index=True)
              if combined.empty:
                  print("ERROR: no hay registros válidos para publicar.")
                  sys.exit(1)

              # Fuente: si hay GlobalID/ObjectID, mantener la versión con mayor prioridad.
              combined["_source_id"] = combined["_source_id"].fillna("").astype(str).str.strip()
              with_id = combined[combined["_source_id"] != ""].copy()
              without_id = combined[combined["_source_id"] == ""].copy()

              if not with_id.empty:
                  with_id = with_id.sort_values("_source_priority").drop_duplicates(subset="_source_id", keep="last")
              combined = pd.concat([without_id, with_id], ignore_index=True)

              # Segundo pase: deduplicación robusta contra histórico sin ID.
              combined["_fallback_key"] = make_dedupe_key(combined)
              before = len(combined)
              combined = (
                  combined.sort_values("_source_priority")
                  .drop_duplicates(subset="_fallback_key", keep="last")
                  .copy()
              )
              print(f"✓ Duplicados eliminados: {before - len(combined)}")

              combined["_sort_fecha"] = parse_datetime_series(combined["Fecha"], prefer_dayfirst=False)
              combined["_sort_creation"] = parse_datetime_series(combined["CreationDate"], prefer_dayfirst=False)
              combined = (
                  combined.sort_values(["_sort_fecha", "_sort_creation"], na_position="last")
                  .drop(columns=["_sort_fecha", "_sort_creation", "_fallback_key", "_source_id", "_source_priority"], errors="ignore")
                  .reset_index(drop=True)
              )

              # Garantía final: el CSV publicado no debe tener Fecha vacía.
              before_final = len(combined)
              combined = combined[combined["Fecha"].apply(clean_text) != ""].copy()
              if before_final - len(combined):
                  print(f"✓ Filas sin Fecha removidas al final: {before_final - len(combined)}")

              if combined.empty:
                  print("ERROR: el CSV final quedó vacío. No se publicará.")
                  sys.exit(1)

              return combined[COLS]

          print("Autenticando en ArcGIS Online...")
          token = auth_token()
          print("✓ Autenticado")

          service_url = resolve_service_url(token)
          print(f"✓ Servicio: {service_url}")
          layer_url = find_layer_url(service_url, token)
          print(f"✓ Layer URL: {layer_url}")

          df_raw, fields = download_features(layer_url, token)
          df_new = prepare_new_dataframe(df_raw, fields)
          df_legacy = prepare_legacy_dataframe(OUTPUT_CSV)
          final = rebuild_csv(df_legacy, df_new)

          final_dates = parse_datetime_series(final["Fecha"], prefer_dayfirst=False)
          print(f"✓ CSV final: {len(final)} registros")
          print(f"✓ Rango Fecha: {final_dates.min()} → {final_dates.max()}")
          print("✓ Registros por guardarecurso:")
          print(final["Nombre del guardarrecursos"].replace("", "Sin nombre").value_counts().to_string())

          final.to_csv(OUTPUT_CSV, index=False, sep=";", encoding="utf-8-sig")
          print(f"✓ Archivo guardado: {OUTPUT_CSV}")
          PYEOF

      - name: Publicar cambios al repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/datos/base4_datos.csv

          if git diff --staged --quiet; then
            echo "Sin cambios en base4_datos.csv. No se necesita commit."
          else
            FECHA=$(TZ="America/Guatemala" date '+%d/%m/%Y %H:%M GT')
            git commit -m "🔄 AC282 Reforestaciones · CSV limpio · $FECHA"
            git push
          fi
