              "Causas otro",
              "Observaciones",
              "CreationDate",
              "Creator",
              "EditDate",
              "Editor",
              "X",
              "Y",
          ]

          RENAME = {
              # IDs del sistema
              "objectid": "ObjectID",
              "OBJECTID": "ObjectID",
              "ObjectID": "ObjectID",
              "globalid": "GlobalID",
              "GLOBALID": "GlobalID",
              "GlobalID": "GlobalID",

              # Identidad / ubicación
