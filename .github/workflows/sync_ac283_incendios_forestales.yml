              "Fecha de llegada de medios aéreos": "Fecha llegada medios aereos",
              "llegada_ma_hora": "Hora llegada medios aereos",
              "Hora de llegada de medios aéreos": "Hora llegada medios aereos",

              # Terreno / superficie
              "propiedad_terreno": "Propiedad del terreno",
              "Tipo de propiedad del terreno afectado (selección múltiple)": "Propiedad del terreno",
              "tipo_bosque": "Tipo de bosque",
              "Tipo de bosque donde ocurrió el incendio": "Tipo de bosque",
              "area_plantacion_ha": "Area plantacion ha",
              "Área afectada Plantación (ha)": "Area plantacion ha",
              "area_bosque_natural_ha": "Area bosque natural ha",
              "Área afectada Bosque natural (ha)": "Area bosque natural ha",
              "pendiente_porcentaje": "Pendiente porcentaje",
              '"No llenar puesto que se calculará automáticamente en el portal" (Porcentaje (%) de inclinación del terreno)': "Pendiente porcentaje",
