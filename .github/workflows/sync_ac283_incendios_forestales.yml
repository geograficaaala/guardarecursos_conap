# .github/workflows/sync_ac283_incendios_forestales.yml
#
# AC283 · Control y liquidación de incendios forestales
# Sincroniza ArcGIS Online / Survey123 → docs/datos/base5_datos.csv
#
# Este workflow sigue la arquitectura del AC282:
#   1. Descarga la capa de Survey123 desde ArcGIS REST.
#   2. Normaliza nombres de columnas a etiquetas estables para los HTML.
#   3. Convierte fechas y horas antes de limpiar texto.
#   4. Conserva histórico válido si existiera un CSV previo.
#   5. Deduplica prefiriendo registros nuevos de ArcGIS.
#   6. Publica docs/datos/base5_datos.csv.

name: Sincronizar AC283 Incendios Forestales

on:
  schedule:
    - cron: "55 18 * * *"   # 12:55 mediodía Guatemala
    - cron: "55 6 * * *"    # 00:55 medianoche Guatemala
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-ac283-incendios-forestales
  cancel-in-progress: false

jobs:
  sync:
    name: Reconstruir CSV limpio de AC283
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests pandas

      - name: Descargar, limpiar y reconstruir base5_datos.csv
        env:
          # Usa los mismos secrets que los workflows existentes.
          # Si la capa es pública, el workflow también funciona sin credenciales.
          AGOL_USERNAME: ${{ secrets.AGOL_USERNAME }}
          AGOL_PASSWORD: ${{ secrets.AGOL_PASSWORD }}
          AGOL_ORG_URL:  ${{ secrets.AGOL_ORG_URL }}

          # Opcional: si más adelante cambia el servicio, crear este secret.
          AC283_FEATURE_SERVICE_URL: ${{ secrets.AC283_FEATURE_SERVICE_URL }}
        run: |
          python3 << 'PYEOF'
          import os
          import re
          import sys
          import time
          import unicodedata
          import requests
          import pandas as pd

          DEFAULT_SERVICE_URL = "https://services1.arcgis.com/IA5cEykpHJ28SD85/arcgis/rest/services/service_555febf73d144439a4d9942cb14a7713_form/FeatureServer"
          ORG_URL  = (os.environ.get("AGOL_ORG_URL") or "https://www.arcgis.com").rstrip("/")
          USERNAME = (os.environ.get("AGOL_USERNAME") or "").strip()
          PASSWORD = (os.environ.get("AGOL_PASSWORD") or "").strip()

          SERVICE_URL = (os.environ.get("AC283_FEATURE_SERVICE_URL") or DEFAULT_SERVICE_URL).strip().rstrip("/")
          OUTPUT_CSV = "docs/datos/base5_datos.csv"
          PAGE_SIZE  = 1000

          COLS = [
              "ObjectID",
              "GlobalID",
              "Nombre del guardarrecursos",
              "Region",
              "Area protegida",
              "Especifique el area protegida",
              "Departamento",
              "Municipio calculado",
              "Municipio",
              "Referencia de ubicacion",
              "Fecha aviso",
              "Hora aviso",
              "Forma de aviso",
              "Fecha llegada medios terrestres",
              "Hora llegada medios terrestres",
              "Llegaron medios aereos",
              "Fecha llegada medios aereos",
              "Hora llegada medios aereos",
              "Propiedad del terreno",
